<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; padding: 15px; font-family: sans-serif; }
    .container { display: flex; flex-direction: column; gap: 10px; }
    h1 { font-size: 18px; margin: 0; color: #003d7c; }
    button { padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #startBtn { background-color: #003d7c; }
    #stopBtn { background-color: #d9534f; margin-top: 5px; }
    #status { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>HanyangAuto</h1>
    <button id="startBtn">자동 수강 시작</button>
    <button id="stopBtn">중지</button>
    <div id="status">상태 확인 중...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
