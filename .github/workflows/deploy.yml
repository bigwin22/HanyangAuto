name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONT_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-front
  BACK_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-back
  AUTOMATION_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-automation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/front.Dockerfile
          push: true
          tags: |
            ${{ env.FRONT_IMAGE }}:${{ github.sha }}
            ${{ env.FRONT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/back.Dockerfile
          push: true
          tags: |
            ${{ env.BACK_IMAGE }}:${{ github.sha }}
            ${{ env.BACK_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push automation image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/automation.Dockerfile
          push: true
          tags: |
            ${{ env.AUTOMATION_IMAGE }}:${{ github.sha }}
            ${{ env.AUTOMATION_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Set up SSH key and config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host hanyang-prod
            HostName ${SERVER_HOST}
            User ${SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/bin/env bash -lc 'CF_ACCESS_CLIENT_ID="${{ secrets.CF_ACCESS_CLIENT_ID }}" CF_ACCESS_CLIENT_SECRET="${{ secrets.CF_ACCESS_CLIENT_SECRET }}" cloudflared access ssh --hostname %h'
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy on server
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          ssh hanyang-prod "cd '${APP_PATH}' && IMAGE_TAG='${IMAGE_TAG}' bash server/docker/deploy.sh"
