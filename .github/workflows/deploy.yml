name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      FRONT_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-front
      BACK_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-back
      AUTOMATION_IMAGE: ghcr.io/${{ github.repository_owner }}/hanyangauto-automation
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/front.Dockerfile
          push: true
          tags: |
            ${{ env.FRONT_IMAGE }}:${{ github.sha }}
            ${{ env.FRONT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/back.Dockerfile
          push: true
          tags: |
            ${{ env.BACK_IMAGE }}:${{ github.sha }}
            ${{ env.BACK_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push automation image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/automation.Dockerfile
          push: true
          tags: |
            ${{ env.AUTOMATION_IMAGE }}:${{ github.sha }}
            ${{ env.AUTOMATION_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on self-hosted runner
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          GHCR_OWNER: ${{ secrets.GHCR_OWNER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DB_ENCRYPTION_KEY_B64: ${{ secrets.DB_ENCRYPTION_KEY_B64 }}
          SESSION_SECRET_B64: ${{ secrets.SESSION_SECRET_B64 }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          RECEIVE_SERVER_URL: http://automation:7000
          CORS_ALLOW_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
          SESSION_COOKIE_SECURE: "true"
          SESSION_COOKIE_SAMESITE: lax
          AUTOMATION_CORS_ALLOW_ORIGINS: ""
          PLAYWRIGHT_HEADLESS: "true"
        run: |
          PROJECT_ROOT="${GITHUB_WORKSPACE}/server"
          APP_DATA_DIR="${APP_PATH}/data"
          APP_LOGS_DIR="${APP_PATH}/logs"
          required_vars=(
            GHCR_OWNER
            GHCR_USERNAME
            GHCR_TOKEN
            CONTAINER_NAME
            DOMAIN
            APP_PATH
            DB_ENCRYPTION_KEY_B64
            SESSION_SECRET_B64
            ADMIN_INITIAL_PASSWORD
            INTERNAL_API_TOKEN
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done
          mkdir -p "${APP_PATH}" "${APP_DATA_DIR}" "${APP_LOGS_DIR}"
          cp "${GITHUB_WORKSPACE}/server/docker/docker-compose.yml" "${APP_PATH}/docker-compose.yml"
          cp "${GITHUB_WORKSPACE}/server/docker/deploy.sh" "${APP_PATH}/deploy.sh"
          chmod 700 "${APP_PATH}/deploy.sh"
          cat > "${APP_PATH}/.env" <<EOF
          GHCR_OWNER=${GHCR_OWNER}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          CONTAINER_NAME=${CONTAINER_NAME}
          DOMAIN=${DOMAIN}
          APP_DATA_DIR=${APP_DATA_DIR}
          APP_LOGS_DIR=${APP_LOGS_DIR}
          DB_ENCRYPTION_KEY_B64=${DB_ENCRYPTION_KEY_B64}
          SESSION_SECRET_B64=${SESSION_SECRET_B64}
          ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          RECEIVE_SERVER_URL=${RECEIVE_SERVER_URL}
          CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
          SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
          SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE}
          AUTOMATION_CORS_ALLOW_ORIGINS=${AUTOMATION_CORS_ALLOW_ORIGINS}
          PLAYWRIGHT_HEADLESS=${PLAYWRIGHT_HEADLESS}
          IMAGE_TAG=${IMAGE_TAG}
          EOF
          chmod 600 "${APP_PATH}/.env"
          IMAGE_TAG="${IMAGE_TAG}" \
          ENV_FILE="${APP_PATH}/.env" \
          COMPOSE_FILE="${APP_PATH}/docker-compose.yml" \
          bash "${APP_PATH}/deploy.sh"
