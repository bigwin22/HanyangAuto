name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/front/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/front/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Run typecheck
        run: npm run typecheck

  docker-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: front
            dockerfile: server/docker/front.Dockerfile
          - image: back
            dockerfile: server/docker/back.Dockerfile
          - image: automation
            dockerfile: server/docker/automation.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: server
          file: ${{ matrix.dockerfile }}
          push: false
          tags: hanyangauto/${{ matrix.image }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
